<!doctype html>
<html lang="en" data-theme="denim">
  <head>
    <script>
      (function () {
        var theme = localStorage.getItem('proto-playground-theme');
        var valid = ['denim', 'sapphire', 'quartz', 'indigo', 'onyx'];
        if (theme && valid.indexOf(theme) !== -1) {
          document.documentElement.setAttribute('data-theme', theme);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mattermost Proto Playground</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
